<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>角色卡管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, Segoe UI, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
    h1 { font-size: 20px; margin-bottom: 16px; }
    .toolbar { margin-bottom: 16px; }
    button { padding: 6px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-primary { background: #533483; color: #fff; }
    .btn-danger { background: #8b0000; color: #fff; }
    .btn-small { padding: 3px 10px; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #0f3460; }
    th { color: #888; font-size: 12px; text-transform: uppercase; }
    tr:hover { background: #16213e; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #533483; }
    .badge.active { background: #2d6a4f; }
    .tag { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; background: #333; margin-right: 4px; }

    dialog { border: 1px solid #0f3460; border-radius: 10px; background: #1a1a2e; color: #e0e0e0; padding: 24px; min-width: 500px; }
    dialog::backdrop { background: rgba(0,0,0,0.6); }
    dialog h3 { margin-bottom: 16px; }
    dialog label { display: block; margin-bottom: 10px; font-size: 13px; color: #aaa; }
    dialog input, dialog textarea { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #0f3460; background: #16213e; color: #e0e0e0; font-size: 13px; margin-top: 4px; }
    dialog textarea { resize: vertical; }
    dialog .row { display: flex; gap: 12px; }
    dialog .row > * { flex: 1; }
    fieldset.check-group { border: 1px solid #0f3460; border-radius: 8px; padding: 10px; flex: 1; }
    fieldset.check-group legend { font-size: 13px; color: #aaa; padding: 0 4px; }
    .radio-inline { display: inline-flex; align-items: center; gap: 2px; margin-right: 8px; font-size: 12px; color: #888; }
    .radio-inline input[type="radio"] { width: auto; margin: 0; }
    .check-list { max-height: 120px; overflow-y: auto; margin-top: 6px; display: flex; flex-wrap: wrap; gap: 2px; }
    .check-list label { display: inline-flex !important; align-items: center; gap: 3px; font-size: 11px !important; padding: 2px 6px; border-radius: 10px; background: #16213e; margin: 0 !important; cursor: pointer; }
    .check-list label input[type="checkbox"] { width: auto; margin: 0; }
    .check-list label:has(input:checked) { background: #533483; }
    .check-list.disabled label { opacity: 0.4; pointer-events: none; }
    .dialog-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .hint { color: #666; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>角色卡管理</h1>
  <div class="toolbar">
    <button class="btn-primary" id="btn-new">+ 新建角色卡</button>
    <span class="hint" style="margin-left:12px" id="status-text"></span>
  </div>
  <table>
    <thead><tr><th>名称</th><th>Skills</th><th>Tools</th><th>状态</th><th>操作</th></tr></thead>
    <tbody id="card-tbody"></tbody>
  </table>
  <p class="hint" id="empty-hint" style="display:none">暂无角色卡，点击「新建」创建第一张</p>

  <dialog id="card-dialog">
    <form method="dialog" id="card-form">
      <h3 id="dialog-title">新建角色卡</h3>
      <label>名称 <input name="name" placeholder="唯一标识" required /></label>
      <label>System Prompt <textarea name="prompt" rows="6" placeholder="AI 核心指令..."></textarea></label>
      <div class="row">
        <fieldset class="check-group">
          <legend>Skills
            <label class="radio-inline"><input type="radio" name="skills_mode" value="all" checked /> 全部</label>
            <label class="radio-inline"><input type="radio" name="skills_mode" value="none" /> 无</label>
            <label class="radio-inline"><input type="radio" name="skills_mode" value="custom" /> 自定义</label>
          </legend>
          <div class="check-list" id="skills-list"></div>
        </fieldset>
        <fieldset class="check-group">
          <legend>Tools
            <label class="radio-inline"><input type="radio" name="tools_mode" value="all" checked /> 全部</label>
            <label class="radio-inline"><input type="radio" name="tools_mode" value="none" /> 无</label>
            <label class="radio-inline"><input type="radio" name="tools_mode" value="custom" /> 自定义</label>
          </legend>
          <div class="check-list" id="tools-list"></div>
        </fieldset>
      </div>
      <details style="margin-top:12px">
        <summary style="cursor:pointer;color:#888;font-size:13px">分层人设（可选）</summary>
        <label>角色描述 <textarea name="description" rows="2"></textarea></label>
        <label>性格 <input name="personality" /></label>
        <label>场景 <input name="scenario" /></label>
        <label>开场白 <input name="first_mes" /></label>
        <label>对话示例 <textarea name="mes_example" rows="3"></textarea></label>
        <label>用户名 <input name="user_name" value="User" /></label>
        <label>用户 Persona <textarea name="persona_description" rows="2"></textarea></label>
      </details>
      <div class="dialog-actions">
        <button type="button" id="btn-cancel">取消</button>
        <button type="submit" class="btn-primary">保存</button>
      </div>
    </form>
  </dialog>

  <script type="module">
    const B = window.AstrBotPluginPage;

    // DOM
    const tbody = document.getElementById("card-tbody");
    const statusText = document.getElementById("status-text");
    const emptyHint = document.getElementById("empty-hint");
    const dialog = document.getElementById("card-dialog");
    const form = document.getElementById("card-form");
    const dialogTitle = document.getElementById("dialog-title");

    let cards = [];
    let activeName = null;
    let editingName = null;
    let availableSkills = [];
    let availableTools = [];

    // ── API ──────────────────────────────────────────

    async function get(path) {
      try {
        const r = await B.apiGet(path);
        console.log("[st-prompt] GET", path, r);
        return r;
      } catch (e) {
        console.error("[st-prompt] GET error", path, e);
        return null;
      }
    }
    async function post(path, data) {
      try {
        const r = await B.apiPost(path, data);
        console.log("[st-prompt] POST", path, r);
        return r;
      } catch (e) {
        console.error("[st-prompt] POST error", path, e);
        return null;
      }
    }

    // ── 列表渲染 ─────────────────────────────────────

    function fmtSkills(val) {
      if (val === null) return '<span class="badge">全部</span>';
      if (!val || val.length === 0) return '<span class="badge">无</span>';
      return val.map(s => `<span class="tag">${esc(s)}</span>`).join("");
    }

    function esc(s) {
      if (s == null) return "";
      const d = document.createElement("div");
      d.textContent = String(s);
      return d.innerHTML;
    }

    function render() {
      tbody.innerHTML = "";
      if (cards.length === 0) {
        emptyHint.style.display = "block";
      } else {
        emptyHint.style.display = "none";
        cards.forEach(c => {
          const tr = document.createElement("tr");
          const active = c.name === activeName;
          tr.innerHTML = `<td><strong>${esc(c.name)}</strong></td>
            <td>${fmtSkills(c.skills)}</td>
            <td>${fmtSkills(c.tools)}</td>
            <td>${active ? '<span class="badge active">当前使用中</span>' : ''}</td>
            <td>
              ${!active ? `<button class="btn-primary btn-small btn-select" data-name="${esc(c.name)}">选用</button>` : ''}
              <button class="btn-small btn-edit" data-name="${esc(c.name)}">编辑</button>
              <button class="btn-danger btn-small btn-delete" data-name="${esc(c.name)}">删除</button>
            </td>`;
          tbody.appendChild(tr);
        });
      }

      statusText.textContent = `共 ${cards.length} 张角色卡，当前: ${activeName || '无'}`;

      // 事件绑定
      tbody.querySelectorAll(".btn-select").forEach(b => b.addEventListener("click", () => selectCard(b.dataset.name)));
      tbody.querySelectorAll(".btn-edit").forEach(b => b.addEventListener("click", () => editCard(b.dataset.name)));
      tbody.querySelectorAll(".btn-delete").forEach(b => b.addEventListener("click", () => deleteCard(b.dataset.name)));
    }

    async function selectCard(name) {
      await post("cards/active", { name });
      activeName = name;
      render();
    }

    // ── 加载 ──────────────────────────────────────────

    async function load() {
      const [sel, all, skills, tools] = await Promise.all([
        get("cards/active"),
        get("cards"),
        get("available-skills"),
        get("available-tools"),
      ]);
      activeName = sel?.name || null;
      cards = Array.isArray(all) ? all : [];
      availableSkills = Array.isArray(skills) ? skills : [];
      availableTools = Array.isArray(tools) ? tools : [];
      render();
    }

    // ── 新建/编辑弹窗 ─────────────────────────────────

    function renderChecks(list, selected, mode) {
      const container = document.getElementById(list);
      if (!container) return;
      container.innerHTML = "";
      const items = list === "skills-list" ? availableSkills : availableTools;
      items.forEach(item => {
        const l = document.createElement("label");
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.value = item.name;
        if (Array.isArray(selected) && selected.includes(item.name)) cb.checked = true;
        l.appendChild(cb);
        l.appendChild(document.createTextNode(item.name));
        container.appendChild(l);
      });
      setCheckMode(list, mode);
    }

    function setCheckMode(list, mode) {
      const c = document.getElementById(list);
      if (!c) return;
      if (mode === "custom") c.classList.remove("disabled");
      else c.classList.add("disabled");
    }

    function setupRadios(prefix) {
      document.querySelectorAll(`input[name="${prefix}_mode"]`).forEach(r => {
        r.addEventListener("change", () => {
          setCheckMode(`${prefix}-list`, document.querySelector(`input[name="${prefix}_mode"]:checked`)?.value);
        });
      });
    }

    document.getElementById("btn-new").addEventListener("click", () => {
      editingName = null;
      dialogTitle.textContent = "新建角色卡";
      form.reset();
      form.name.removeAttribute("readonly");
      renderChecks("skills-list", [], "all");
      renderChecks("tools-list", [], "all");
      setupRadios("skills");
      setupRadios("tools");
      dialog.showModal();
    });

    async function editCard(name) {
      const card = await get(`cards/${encodeURIComponent(name)}`);
      if (!card || card.error) return alert("无法加载角色卡");
      editingName = name;
      dialogTitle.textContent = `编辑 ${name}`;
      form.name.value = card.name || "";
      form.name.setAttribute("readonly", "");
      form.prompt.value = card.prompt || "";

      const sp = parseList(card.skills);
      renderChecks("skills-list", sp.values, sp.mode);
      document.querySelectorAll('input[name="skills_mode"]').forEach(r => r.checked = r.value === sp.mode);

      const tp = parseList(card.tools);
      renderChecks("tools-list", tp.values, tp.mode);
      document.querySelectorAll('input[name="tools_mode"]').forEach(r => r.checked = r.value === tp.mode);

      setupRadios("skills");
      setupRadios("tools");

      form.description.value = card.description || "";
      form.personality.value = card.personality || "";
      form.scenario.value = card.scenario || "";
      form.first_mes.value = card.first_mes || "";
      form.mes_example.value = card.mes_example || "";
      form.user_name.value = card.user_name || "User";
      form.persona_description.value = card.persona_description || "";
      dialog.showModal();
    }

    function parseList(raw) {
      if (raw === null || raw === undefined) return { mode: "all", values: [] };
      if (Array.isArray(raw) && raw.length === 0) return { mode: "none", values: [] };
      if (Array.isArray(raw)) return { mode: "custom", values: raw };
      return { mode: "all", values: [] };
    }

    document.getElementById("btn-cancel").addEventListener("click", () => dialog.close());

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const modeToList = (mode, vals) => {
        if (mode === "all") return null;
        if (mode === "none") return [];
        return vals;
      };
      const data = {
        name: fd.get("name").trim(),
        prompt: fd.get("prompt"),
        skills: modeToList(fd.get("skills_mode"), [...document.querySelectorAll("#skills-list input:checked")].map(cb => cb.value)),
        tools: modeToList(fd.get("tools_mode"), [...document.querySelectorAll("#tools-list input:checked")].map(cb => cb.value)),
        description: fd.get("description"),
        personality: fd.get("personality"),
        scenario: fd.get("scenario"),
        first_mes: fd.get("first_mes"),
        mes_example: fd.get("mes_example"),
        user_name: fd.get("user_name") || "User",
        persona_description: fd.get("persona_description"),
      };
      if (!data.name) return;

      await post("cards/save", data);
      if (editingName && editingName !== data.name) {
        await post("cards/delete", { name: editingName });
      }
      dialog.close();
      await load();
    });

    // ── 删除 ──────────────────────────────────────────

    async function deleteCard(name) {
      if (!confirm(`确定删除「${name}」？`)) return;
      await post("cards/delete", { name });
      if (activeName === name) activeName = null;
      await load();
    }

    // ── 初始化 ────────────────────────────────────────

    await B.ready();
    await load();
  </script>
</body>
</html>
